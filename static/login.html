<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --card: #161b27;
  --border: rgba(99,126,177,0.15);
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-glow: rgba(59,130,246,0.15);
  --text: #e2e8f0;
  --text2: #718096;
  --text3: #4a5568;
  --success: #10b981;
  --error: #ef4444;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Glow orb */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.login-wrap {
  width: 420px;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}

.brand-icon {
  width: 52px;
  height: 52px;
  background: var(--accent-glow);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}

.brand-icon svg {
  width: 26px;
  height: 26px;
  stroke: var(--accent);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.brand h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.brand p {
  font-size: 13px;
  color: var(--text2);
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
}

.input-wrap svg {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  stroke: var(--text3);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
  transition: stroke 0.2s;
}

.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 42px 12px 16px;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  transition: all 0.2s;
  outline: none;
}

.form-group input:focus {
  border-color: var(--accent);
  background: var(--accent-glow);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.form-group input:focus + svg,
.input-wrap:focus-within svg {
  stroke: var(--accent);
}

.form-group input::placeholder { color: var(--text3); }

.remember-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  user-select: none;
}

.remember input[type=checkbox] { display: none; }

.check-custom {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.remember input:checked ~ .check-custom {
  background: var(--accent);
  border-color: var(--accent);
}

.remember input:checked ~ .check-custom::after {
  content: '';
  width: 5px;
  height: 9px;
  border: 2px solid white;
  border-top: none;
  border-right: none; /* RTL: flip */
  border-left: 2px solid white;
  border-right: none;
  transform: rotate(-45deg) translateY(-1px);
}

.login-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }

.login-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}

.spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 0 auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

.btn-text { transition: opacity 0.2s; }
.login-btn.loading .btn-text { display: none; }
.login-btn.loading .spinner { display: block; }

.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #fc8181;
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
  text-align: center;
}

.error-msg.show { display: block; animation: shake 0.3s ease; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}

.users-hint {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.8;
}

.users-hint strong { color: var(--text2); }

.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: var(--text3);
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <h1>لوحة التحكم</h1>
    <p>سجل دخولك للمتابعة</p>
  </div>

  <div class="card">
    <div class="error-msg" id="error-msg">اسم المستخدم أو كلمة المرور غلط</div>

    <div class="form-group">
      <label>اسم المستخدم</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="admin" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>

    <div class="form-group">
      <label>كلمة المرور</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
    </div>

    <div class="remember-row">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span class="check-custom"></span>
        تذكرني
      </label>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <span class="btn-text">دخول</span>
      <div class="spinner"></div>
    </button>

    <hr class="divider">

    <div class="users-hint">
      <strong>بيانات التجربة:</strong><br>
      admin / admin123 &nbsp;|&nbsp; team / team123
    </div>
  </div>

  <div class="footer-note">نظام متابعة التيم — الشهر الاول</div>
</div>

<script>
const USERS = {
  'admin': { pass: 'admin123', name: 'المدير', role: 'admin' },
  'team':  { pass: 'team123',  name: 'التيم',  role: 'member' },
};

// Auto-login if remembered
const saved = localStorage.getItem('dashboard_user');
if (saved) {
  try {
    const u = JSON.parse(saved);
    if (USERS[u.username]) { sessionStorage.setItem('dashboard_user', saved); redirect(); }
  } catch(e) {}
}

function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  err.classList.remove('show');
  btn.classList.add('loading');

  setTimeout(() => {
    const user = USERS[username];
    if (user && user.pass === password) {
      const data = JSON.stringify({ username, name: user.name, role: user.role });
      sessionStorage.setItem('dashboard_user', data);
      if (remember) localStorage.setItem('dashboard_user', data);
      redirect();
    } else {
      btn.classList.remove('loading');
      err.classList.add('show');
      document.getElementById('password').value = '';
    }
  }, 700);
}

function redirect() { window.location.href = '/'; }
</script>
</body>
</html>
